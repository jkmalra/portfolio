<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(76, 201, 255, 0.18), transparent 25%),
          linear-gradient(180deg, #07101d 0%, #040813 100%);
        color: #eff6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        padding: 40px;
        border-radius: 28px;
        border: 1px solid rgba(138, 245, 211, 0.2);
        background: rgba(7, 17, 31, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      p {
        color: #b7c8dd;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border-radius: 999px;
        background: linear-gradient(135deg, #8af5d3, #c8ffe8);
        color: #04111d;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p>404</p>
      <h1>This page drifted out of the timeline.</h1>
      <p>
        The portfolio page you tried to open is not available. Head back to the main experience
        and continue from there.
      </p>
      <a href="/">Return home</a>
    </main>
  </body>
  </html>
